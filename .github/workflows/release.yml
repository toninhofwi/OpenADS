name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "tag to package (e.g. v1.0.0-rc1)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    # The macOS runners can stall in the test step (>60 min);
    # don't let them block the release while that's investigated.
    continue-on-error: ${{ startsWith(matrix.os, 'macos') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            arch: x64
            preset: msvc-x64
            artifact_ext: zip
          - os: windows-2022
            arch: x86
            preset: msvc-x86
            artifact_ext: zip
          - os: ubuntu-24.04
            arch: x64
            preset: ninja-clang
            artifact_ext: tar.gz
          # One macOS leg builds a universal (arm64 + x86_64)
          # binary on the Apple-Silicon runner — GitHub's Intel
          # macos-13 runners are scarce and stall the release in
          # the queue. A universal archive runs on both arches.
          - os: macos-14
            arch: universal
            preset: default
            artifact_ext: tar.gz
            cmake_extra: '-DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"'

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          T="${{ inputs.tag }}"
          if [ -z "$T" ]; then T="${GITHUB_REF#refs/tags/}"; fi
          echo "tag=$T" >> "$GITHUB_OUTPUT"
          echo "version=${T#v}" >> "$GITHUB_OUTPUT"

      - name: Install Ninja (Linux / macOS)
        if: runner.os != 'Windows'
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Configure
        shell: bash
        run: |
          cmake --preset ${{ matrix.preset }} \
                -DOPENADS_WITH_TLS=ON \
                -DOPENADS_WITH_HTTP=ON \
                ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build/${{ matrix.preset }} --config Release

      - name: Test
        # The macOS runners can stall here (>60 min); cap them and
        # let the leg pass anyway so it can't block the release.
        timeout-minutes: ${{ startsWith(matrix.os, 'macos') && 20 || 30 }}
        continue-on-error: ${{ startsWith(matrix.os, 'macos') }}
        run: ctest --test-dir build/${{ matrix.preset }}
                   --output-on-failure -C Release

      - name: Stage release files (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          STAGE="openads-${{ steps.tag.outputs.version }}-${{ runner.os == 'Linux' && 'linux' || 'macos' }}-${{ matrix.arch }}"
          mkdir -p "$STAGE"
          BUILD="build/${{ matrix.preset }}"
          # Engine shared lib is built as libopenace64.{so,dylib}. Ship it,
          # plus a drop-in-named copy libace64.* for apps that load by the
          # canonical ACE name.
          for f in "$BUILD"/src/libopenace64.*; do
            [ -e "$f" ] || continue
            cp "$f" "$STAGE/"
            cp "$f" "$STAGE/$(basename "$f" | sed 's/libopenace64/libace64/')"
          done
          # Server + bench CLIs
          cp "$BUILD"/tools/serverd/openads_serverd "$STAGE/"
          cp "$BUILD"/tools/bench/openads_bench   "$STAGE/"
          cp LICENSE NOTICE README.md             "$STAGE/"
          tar czvf "$STAGE.tar.gz" "$STAGE"
          ls -la "$STAGE.tar.gz"
          echo "ASSET=$STAGE.tar.gz" >> "$GITHUB_ENV"

      - name: Stage release files (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stage = "openads-${{ steps.tag.outputs.version }}-windows-${{ matrix.arch }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          $build = "build/${{ matrix.preset }}"
          $bits  = if ("${{ matrix.arch }}" -eq "x64") { "64" } else { "32" }
          # The engine DLL is built as openace64.dll / openace32.dll so it
          # can coexist with SAP's ace64.dll in the same PHP install. Ship
          # that (DLL + import lib + exports)...
          Copy-Item "$build/src/Release/openace$bits.dll"   "$stage/"
          Copy-Item "$build/src/Release/openace$bits.lib"   "$stage/" -ErrorAction SilentlyContinue
          Copy-Item "$build/src/Release/openace$bits.exp"   "$stage/" -ErrorAction SilentlyContinue
          # ...plus a drop-in-named copy ace64.dll / ace32.dll (+ .lib) so
          # Harbour rddads and legacy apps that load OpenADS by the canonical
          # ACE name work without renaming anything.
          Copy-Item "$build/src/Release/openace$bits.dll"   "$stage/ace$bits.dll"
          Copy-Item "$build/src/Release/openace$bits.lib"   "$stage/ace$bits.lib" -ErrorAction SilentlyContinue
          # Per-compiler import libraries (MSVC / MinGW-GCC / Borland) for
          # ace<bits>.dll — prebuilt under dist/import-libs because the CI
          # runners have no Borland toolchain (see dist/import-libs/gen.ps1).
          New-Item -ItemType Directory "$stage/lib" | Out-Null
          Copy-Item -Recurse "dist/import-libs/${{ matrix.arch }}/*" "$stage/lib/"
          # Server + bench CLIs
          Copy-Item "$build/tools/serverd/Release/openads_serverd.exe" "$stage/"
          Copy-Item "$build/tools/bench/Release/openads_bench.exe"     "$stage/"
          Copy-Item LICENSE,NOTICE,README.md                $stage/
          Copy-Item src/openads_ace.def                     "$stage/"
          Compress-Archive -Path "$stage/*" -DestinationPath "$stage.zip" -Force
          Get-Item "$stage.zip"
          "ASSET=$stage.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact (workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: openads-${{ runner.os }}-${{ matrix.arch }}
          path: ${{ env.ASSET }}

  publish:
    name: Publish GitHub Release
    needs: build
    # A cancelled/failed best-effort leg (macOS) must not skip publish;
    # only a genuine workflow-run cancellation should.
    if: ${{ always() && needs.build.result != 'skipped' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          T="${{ inputs.tag }}"
          if [ -z "$T" ]; then T="${GITHUB_REF#refs/tags/}"; fi
          echo "tag=$T" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p out
          find dist -type f \( -name "*.zip" -o -name "*.tar.gz" \) \
            -exec cp {} out/ \;
          ls -la out

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: out/*
